[general]
	live_config_reload = true
	import = [
	    "~/.config/alacritty/themes/themes/enfocado_light.toml",
	    "~/.config/alacritty/themes/themes/Mariana.toml",
	    "~/.config/alacritty/themes/themes/autumn.toml",
	    "~/.config/alacritty/themes/themes/gruvbox_dark.toml",
	    "~/.config/alacritty/themes/themes/gruvbox_material_dark.toml",
	    "~/.config/alacritty/themes/themes/hardhacker.toml",
	    "~/.config/alacritty/themes/themes/high_contrast.toml",
	    "~/.config/alacritty/themes/themes/material_theme_mod.toml",
	    "~/.config/alacritty/themes/themes/everforest_dark_theme.toml",
	]

[window]
	decorations = "Transparent"
	opacity = 0.9
	blur = false
# startup_mode = "SimpleFullscreen"
	startup_mode = "Fullscreen"

[cursor]
	style = { shape = "Block", blinking = "Always" }
	blink_interval = 600
	blink_timeout = 0
	unfocused_hollow = true


[env]
    TERM = "xterm-256color"

[font]
    size = 18.0

    [font.bold]
        family = "IosevkaTerm Nerd Font"
        style  = "Bold"

    [font.bold_italic]
        family = "IosevkaTerm Nerd Font"
        style  = "Bold Italic"

    [font.glyph_offset]
        x = 0
        y = 0

    [font.italic]
        family = "IosevkaTerm Nerd Font"
        style  = "Italic"

    [font.normal]
        family = "IosevkaTerm Nerd Font"
        style  = "Regular"

    [font.offset]
        x = 0
        y = 0

[[keyboard.bindings]]
    action = "Quit"
    key    = "W"
    mods   = "Command|Shift"

[[keyboard.bindings]]
    action = "SpawnNewInstance"
    key    = "N"
    mods   = "Command"

[[keyboard.bindings]]
    chars = "\u001Bb"
    key   = "Left"
    mods  = "Alt"

[[keyboard.bindings]]
    chars = "\u001Bf"
    key   = "Right"
    mods  = "Alt"

[[keyboard.bindings]]
    chars = "\u0001"
    key   = "Left"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u0005"
    key   = "Right"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u0015"
    key   = "Back"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001B\u007F"
    key   = "Back"
    mods  = "Alt"

[[keyboard.bindings]]
    chars = "\u001cc"
    key   = "T"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C&"
    key   = "W"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001Cp"
    key   = "LBracket"
    mods  = "Command|Shift"

[[keyboard.bindings]]
    chars = "\u001Cn"
    key   = "RBracket"
    mods  = "Command|Shift"

[[keyboard.bindings]]
    chars = "\u001C1"
    key   = "Key1"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C2"
    key   = "Key2"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C3"
    key   = "Key3"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C4"
    key   = "Key4"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C5"
    key   = "Key5"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C6"
    key   = "Key6"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C7"
    key   = "Key7"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C8"
    key   = "Key8"
    mods  = "Command"

[[keyboard.bindings]]
    chars = "\u001C9"
    key   = "Key9"
    mods  = "Command"

[[keyboard.bindings]]
    action = "ReceiveChar"
    key    = "Back"

[scrolling]
    history    = 10000
    multiplier = 4

[selection]
    save_to_clipboard     = true
    semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[terminal.shell]
    args    = ["-l", "-c", "tmux attach || tmux"]
    program = "/bin/zsh"

[window.dimensions]
    columns = 90
    lines   = 25

[window.padding]
    x = 2
    y = 2
